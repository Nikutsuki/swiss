server {
    listen 80;
    server_name ~^(www|auth|monolith|drop|stream|signal|stream-api|fiszki|socketparty)\..+$;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name nikutsuki.top;
    return 301 https://www.nikutsuki.top$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name nikutsuki.top;

    ssl_certificate /etc/nginx/ssl/origin-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    return 301 https://www.nikutsuki.top$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ~^auth\..+$;

    ssl_certificate /etc/nginx/ssl/origin-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    location / {
        set $auth_portal_upstream auth-portal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$auth_portal_upstream;
    }
}

