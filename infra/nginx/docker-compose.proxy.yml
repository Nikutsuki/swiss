name: swiss-proxy

services:
  nginx:
    image: nginx:alpine
    container_name: swiss-nginx-reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./html:/etc/nginx/html
      - ./cdn:/var/www/cdn
      - ${SSL_CERTS_DIR:-../../certs}:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx
    networks:
      - edge-proxy-network
      - monitoring-network
    restart: always
    depends_on:
      - nginx-exporter
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: swiss-nginx-exporter
    command:
      - "-nginx.scrape-uri=http://nginx:8080/nginx_status"
    networks:
      - edge-proxy-network
      - monitoring-network
    restart: always

networks:
  edge-proxy-network:
    external: true
  monitoring-network:
    external: true
